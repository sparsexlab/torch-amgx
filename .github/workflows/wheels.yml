name: Build wheels

# torch-amgx binds NVIDIA AmgX, which is CUDA-only. "Cross-platform" here
# therefore means Linux x86_64 + Windows x64, both with CUDA. macOS and AMD
# are intentionally NOT targeted (no CUDA there).

on:
  push:
    tags: ["v*"]            # tagging v* builds + publishes to the GH Release
  workflow_dispatch:        # plus manual trigger from the GH UI
    inputs:
      publish:
        description: "Upload built wheels to the GitHub Release for this ref"
        required: false
        type: boolean
        default: false

jobs:
  build_wheels:
    name: ${{ matrix.os }} / py${{ matrix.python }} / cu${{ matrix.cuda }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]
        # torch ships cp313 wheels now, so 3.13 is built too.
        python: ["3.10", "3.11", "3.12", "3.13"]
        # cu12.4 covers torch 2.4-2.6; cu12.6 covers torch 2.6+; cu12.8 is
        # the first toolkit with Blackwell (sm_100/sm_120) codegen. The CUDA
        # toolkit installed here only has to match the torch build we link
        # against at compile time (torch's cpp_extension hard-fails on a
        # toolkit/torch CUDA-major mismatch), so torch below is pinned to
        # the matching CUDA index-url.
        cuda: ["12.4", "12.6", "12.8"]
        # Per-cuda fat-binary arch list (consumed by scripts/build_amgx.sh
        # and the Windows CMake step via the CUDA_ARCH env var). 70=Volta,
        # 80=Ampere, 89=Ada, 90=Hopper, 100/120=Blackwell. nvcc only knows
        # the Blackwell SMs from cu12.8, so the <=12.6 builds instead append
        # the virtual PTX of their top arch (90-virtual) so those wheels
        # JIT-forward onto Blackwell at runtime.
        include:
          # cuda_arch  -> AmgX fat-binary list (nvcc/CMake `70;80;...` syntax)
          # torch_arch -> torch's TORCH_CUDA_ARCH_LIST (semver, space-sep,
          #               `+PTX` on the top virtual arch). Set on the "Build
          #               wheel" step so torch.utils.cpp_extension skips GPU
          #               probing (CI runners have no GPU -> device_count()==0
          #               -> IndexError in _get_cuda_arch_flags). Must MATCH
          #               the AmgX cuda_arch chosen for the same row.
          - cuda: "12.4"
            cuda_arch: "70;80;89;90;90-virtual"
            torch_arch: "7.0 8.0 8.9 9.0+PTX"
          - cuda: "12.6"
            cuda_arch: "70;80;89;90;90-virtual"
            torch_arch: "7.0 8.0 8.9 9.0+PTX"
          - cuda: "12.8"
            cuda_arch: "70;80;89;90;100;120"
            torch_arch: "7.0 8.0 8.9 9.0 10.0 12.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pull NVIDIA/AMGX

      - name: Install Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Windows: load MSVC env (cl.exe) so nvcc can find the host compiler.
      # Without this CMake fails at "CMakeCUDACompilerId.cu" with
      # "Cannot find compiler 'cl.exe' in PATH".
      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # --- CUDA Toolkit ---------------------------------------------- #
      # AmgX's CMake links the IMPORTED targets CUDA::cublas, CUDA::cusparse
      # and CUDA::cusolver. find_package(CUDAToolkit) only creates those
      # targets when both the runtime libs AND the dev import libs are
      # present. We install the FULL toolkit on both platforms (method:
      # local): the network sub-package split for the dev import libs is
      # unreliable -- on Windows it previously broke with "Target ...
      # CUDA::cublas ... but the target was not found", and on Linux the
      # cherry-picked apt packages (cuda-cublas-12-8 / cuda-cusparse-12-8)
      # simply do not exist for cu12.x ("Unable to locate package").
      - name: Install CUDA toolkit ${{ matrix.cuda }} (Linux)
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: ${{ matrix.cuda }}.0
          method: local      # full toolkit: the network sub-package split
                             # (cuda-cublas-12-8 / cuda-cusparse-12-8) does
                             # not exist as apt packages for cu12.x, so the
                             # cherry-picked install fails with "Unable to
                             # locate package". local mirrors the Windows
                             # step and guarantees the cublas/cusparse dev
                             # import libs AmgX's find_package(CUDAToolkit)
                             # needs (~3 GB download, but it works).

      - name: Install CUDA toolkit ${{ matrix.cuda }} (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: ${{ matrix.cuda }}.0
          method: local      # full toolkit: guarantees cublas/cusparse/cusolver dev libs

      # --- Build AmgX ------------------------------------------------ #
      # CUDA_ARCH is the fat-binary arch list, picked per-cuda by the matrix
      # include: above. 70=Volta, 80=Ampere, 89=Ada, 90=Hopper,
      # 100/120=Blackwell (cu12.8 only); the <=12.6 builds carry 90-virtual
      # PTX so they JIT-forward onto Blackwell.
      - name: Build AmgX (Linux)
        if: runner.os == 'Linux'
        env:
          CUDA_ARCH: ${{ matrix.cuda_arch }}
          CMAKE_PARALLEL: "4"
        run: bash scripts/build_amgx.sh

      - name: Build AmgX (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          # CUDA_PATH is exported by the cuda-toolkit action above.
          CUDA_ARCH: ${{ matrix.cuda_arch }}
        run: |
          # scripts/build_amgx.ps1 hard-codes a local tb16 dev box (VS
          # BuildTools + Miniforge paths) and is kept only for that box.
          # On CI the MSVC env is already loaded by msvc-dev-cmd and CUDA
          # by the cuda-toolkit action, so drive CMake directly here.
          $install = "$pwd/build/amgx/install"
          cmake -S third_party/AMGX -B build/amgx -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$install" `
            -DCMAKE_CUDA_ARCHITECTURES="$env:CUDA_ARCH" `
            -DCUDAToolkit_ROOT="$env:CUDA_PATH" `
            -DAMGX_NO_RPATH=ON `
            -DCMAKE_CUDA_FLAGS="-allow-unsupported-compiler"
          if ($LASTEXITCODE -ne 0) { throw "AmgX CMake configure failed" }
          # Build the static (amgx) + shared (amgxsh) libs AND the tiny
          # amgx_capi example. AmgX's cmake_install.cmake unconditionally
          # installs all three (static amgx.lib, shared amgxsh, and the
          # examples/amgx_capi[.exe]), so building only amgx+amgxsh makes
          # `cmake --install` fail with "file INSTALL cannot find
          # .../amgx_capi.exe". amgx_capi is a single small C file that links
          # the already-built amgxsh -- it adds seconds, not the ~30 min the
          # full example/test build would. setup.py links amgxsh.lib and
          # delvewheel bundles amgxsh.dll, so amgxsh is still what the wheel
          # uses; amgx + amgx_capi are built only to satisfy the install step.
          cmake --build build/amgx --config Release --target amgx amgxsh amgx_capi --parallel 4
          if ($LASTEXITCODE -ne 0) { throw "AmgX build failed" }
          cmake --install build/amgx --config Release
          if ($LASTEXITCODE -ne 0) { throw "AmgX install failed" }

      # --- Build wheel + bundle AmgX into it ------------------------- #
      # torch MUST be installed from the CUDA-matched index-url. The plain
      # "pip install torch" pulls whatever CUDA the latest torch ships with
      # (currently cu13.0), and torch.utils.cpp_extension then hard-fails
      # with "The detected CUDA version (12.6) mismatches the version that
      # was used to compile PyTorch (13.0)". numpy is also required at
      # build time (torch import warns + downstream breaks without it).
      - name: Install build tooling
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel build
          CU_TAG="cu$(echo '${{ matrix.cuda }}' | tr -d '.')"   # 12.4 -> cu124
          pip install --index-url "https://download.pytorch.org/whl/${CU_TAG}" torch
          pip install numpy pybind11
          if [ "$RUNNER_OS" = "Linux" ]; then
            pip install auditwheel
          else
            pip install delvewheel
          fi

      # Linux build runs in bash. On Linux, Git's coreutils `link` is not on
      # PATH ahead of the toolchain, so the bash shell is fine here.
      - name: Build wheel (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          AMGX_DIR: ${{ github.workspace }}/build/amgx/install
          # CI runners have no GPU, so torch.cuda.device_count()==0 and
          # torch.utils.cpp_extension._get_cuda_arch_flags() indexes an empty
          # arch list -> "IndexError: list index out of range". Setting
          # TORCH_CUDA_ARCH_LIST makes torch skip GPU probing and emit
          # PTX/SASS for the intended arches (matches the AmgX cuda_arch row).
          TORCH_CUDA_ARCH_LIST: ${{ matrix.torch_arch }}
        run: python -m build --wheel --no-isolation

      # Windows build MUST run in pwsh, NOT bash. The windows-2022 runner's
      # `shell: bash` is Git Bash, whose C:\Program Files\Git\usr\bin\link.exe
      # is GNU coreutils `link` (a hardlink tool), not MSVC's `link.exe`.
      # Git's /usr/bin precedes the MSVC toolchain on PATH, so torch/CUDA's
      # link step picks the wrong link.exe and fails with
      #   error: command '...\Git\usr\bin\link.exe' failed with exit code 1
      # Running in pwsh keeps Git's /usr/bin off PATH, so the MSVC link.exe
      # loaded by ilammy/msvc-dev-cmd is used (same as "Build AmgX (Windows)").
      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AMGX_DIR: ${{ github.workspace }}/build/amgx/install
          TORCH_CUDA_ARCH_LIST: ${{ matrix.torch_arch }}
          # msvc-dev-cmd activates the VC env, but torch's
          # cpp_extension._check_abi() then hard-raises
          #   "the VC environment is activated but DISTUTILS_USE_SDK is not set"
          # (it refuses to re-activate the env itself). Setting
          # DISTUTILS_USE_SDK=1 tells setuptools the SDK/VC env is already
          # live, which satisfies the check.
          DISTUTILS_USE_SDK: 1
        run: python -m build --wheel --no-isolation

      - name: Bundle AmgX library into wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist-repaired
          # auditwheel locates the to-bundle libs via LD_LIBRARY_PATH; point it
          # at the AmgX install so it can find libamgxsh.so to vendor in.
          export LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/build/amgx/install/lib:${LD_LIBRARY_PATH:-}"
          for whl in dist/*.whl; do
            # The extension is compiled with the ubuntu-22.04 runner's system
            # GCC, which links glibc 2.35 versioned symbols. Those are too
            # recent for manylinux_2_28 (glibc 2.28), so auditwheel rejected
            # the repair with "presence of too-recent versioned symbols".
            # ubuntu-22.04 ships glibc 2.35, so target manylinux_2_35 (the
            # platform actually built here) instead. AmgX's libamgxsh.so is
            # still bundled; only torch/CUDA runtime libs stay excluded.
            auditwheel repair \
              --plat manylinux_2_35_x86_64 \
              --exclude "libtorch*.so" \
              --exclude "libc10*.so" \
              --exclude "libcudart*.so*" \
              --exclude "libcublas*.so*" \
              --exclude "libcusparse*.so*" \
              --exclude "libcusolver*.so*" \
              -w dist-repaired \
              "$whl"
          done
          # Stamp a per-CUDA PEP 427 build tag (0_cu124/0_cu126/0_cu128) into
          # the wheel filename + WHEEL metadata. Without this, the cu12.4 /
          # cu12.6 / cu12.8 builds for the same (os, py) share an identical
          # filename and OVERWRITE each other as GitHub Release assets -- only
          # the last survives, and installing it onto a host whose torch was
          # built for a different CUDA fails at runtime with a torch C++ ABI
          # mismatch. The tag makes all 3 CUDA wheels publish distinctly.
          mkdir -p dist-final
          python -m pip install --upgrade pip >/dev/null
          python scripts/tag_wheel.py "${{ matrix.cuda }}" dist-repaired dist-final

      - name: Bundle AmgX library into wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AMGX_DIR: ${{ github.workspace }}/build/amgx/install
        run: |
          mkdir dist-repaired
          Get-ChildItem dist/*.whl | ForEach-Object {
            # Mirror the Linux auditwheel excludes: torch's own DLLs and the
            # CUDA runtime DLLs must NOT be vendored (they ship with the user's
            # torch / CUDA install). delvewheel's --exclude takes a single
            # semicolon-separated list on Windows and supports the * wildcard;
            # without these, delvewheel tries to locate torch_python.dll and
            # dies with "Unable to find library: torch_python.dll".
            # --add-path still points at the AmgX bin so amgxsh.dll IS bundled.
            delvewheel repair `
              --add-path "$env:AMGX_DIR/bin;$env:AMGX_DIR/lib" `
              --exclude "torch_python.dll;torch.dll;torch_cpu.dll;torch_cuda.dll;c10.dll;c10_cuda.dll;fbgemm.dll;cudart64_*.dll;cublas64_*.dll;cublasLt64_*.dll;cusparse64_*.dll;cusolver64_*.dll;nvrtc*.dll" `
              -w dist-repaired `
              $_.FullName
          }
          # Stamp a per-CUDA PEP 427 build tag (0_cu124/0_cu126/0_cu128) into
          # the wheel filename + WHEEL metadata so the cu12.4 / cu12.6 / cu12.8
          # builds for the same (os, py) don't share a filename and overwrite
          # each other as GitHub Release assets (see the Linux step's note).
          mkdir dist-final
          python scripts/tag_wheel.py "${{ matrix.cuda }}" dist-repaired dist-final
          if ($LASTEXITCODE -ne 0) { throw "tag_wheel failed" }

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}-cu${{ matrix.cuda }}
          path: dist-final/*.whl

  # Publish to GitHub Releases (the maintainer has no PyPI access). Tagging
  # v* builds all wheels above and attaches them to that tag's Release;
  # users then `pip install <release-asset-url>`.
  publish:
    name: Publish wheels to GitHub Release
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: write     # required to create/update the Release + upload assets
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # On a tag push, attach to that tag's Release. On a manual
          # dispatch, attach to a Release named after the branch/ref so the
          # run still produces installable assets.
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('ci-{0}', github.ref_name) }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('CI build ({0})', github.ref_name) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: dist/*.whl
          fail_on_unmatched_files: true
