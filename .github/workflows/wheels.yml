name: Build wheels

on:
  push:
    tags: ["v*"]            # triggered on every version tag
  workflow_dispatch:        # plus manual trigger from the GH UI
    inputs:
      publish:
        description: "Upload wheels to PyPI (requires Trusted Publisher)"
        required: false
        type: boolean
        default: false

jobs:
  build_wheels:
    name: ${{ matrix.os }} / py${{ matrix.python }} / cu${{ matrix.cuda }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]
        python: ["3.10", "3.11", "3.12"]
        cuda: ["12.4", "12.8"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pull NVIDIA/AMGX

      - name: Install Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # --- CUDA Toolkit ---------------------------------------------- #
      - name: Install CUDA toolkit ${{ matrix.cuda }} (Linux)
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: ${{ matrix.cuda }}.0
          method: network
          sub-packages: '["nvcc", "cudart", "cudart-dev", "cusparse", "cusparse-dev", "cublas", "cublas-dev"]'

      - name: Install CUDA toolkit ${{ matrix.cuda }} (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: ${{ matrix.cuda }}.0
          method: network
          sub-packages: '["nvcc", "cudart", "cusparse", "cublas", "visual_studio_integration"]'

      # --- Build AmgX ------------------------------------------------ #
      - name: Build AmgX (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/build_amgx.sh

      - name: Build AmgX (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # The Windows build script reuses the same CMakeLists driven
          # via PowerShell; mirror scripts/build_amgx.sh for Windows.
          ./scripts/build_amgx.ps1

      # --- Build wheel + bundle AmgX into it ------------------------- #
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip wheel build
          pip install "torch>=2.4" pybind11
          # Tools that bundle native shared libs into wheels:
          if [ "$RUNNER_OS" = "Linux" ]; then
            pip install auditwheel
          else
            pip install delvewheel
          fi
        shell: bash

      - name: Build wheel
        env:
          AMGX_DIR: ${{ github.workspace }}/build/amgx/install
        run: python -m build --wheel

      - name: Bundle AmgX library into wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          for whl in dist/*.whl; do
            auditwheel repair \
              --plat manylinux_2_28_x86_64 \
              -w dist-repaired \
              "$whl"
          done

      - name: Bundle AmgX library into wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AMGX_DIR: ${{ github.workspace }}/build/amgx/install
        run: |
          mkdir dist-repaired
          Get-ChildItem dist/*.whl | ForEach-Object {
            delvewheel repair `
              --add-path "$env:AMGX_DIR/bin;$env:AMGX_DIR/lib" `
              -w dist-repaired `
              $_.FullName
          }

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}-cu${{ matrix.cuda }}
          path: dist-repaired/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    environment:
      name: pypi
      url: https://pypi.org/p/torch-amgx
    permissions:
      id-token: write     # Trusted Publisher OIDC, no API token needed
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
